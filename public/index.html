<!doctype html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArcGrid Guide Constructor</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div class="w-[min(1200px,calc(100%-48px))] mx-auto my-6 grid min-[800px]:grid-layout-main gap-6">
    <section class="bg-[var(--color-panel)] border border-[var(--color-line)] rounded-2xl p-6 flex flex-col gap-4">
      <div class="flex justify-between items-center">
        <div class="flex gap-2 items-center">
          <img src="/logo.png" alt="ArcGrid" class="w-8 h-8 flex-shrink-0 rounded-lg">
          <h1 data-i18n="title" class="text-lg font-semibold">ArcGrid Guide Lab</h1>
        </div>
        <div class="lang-switcher">
          <label><input type="radio" name="lang" value="en"> EN</label>
          <label><input type="radio" name="lang" value="zh" checked> 中</label>
        </div>
      </div>
      <p data-i18n="desc" class="-mt-1 text-[13px] text-[var(--color-muted)]">Auto-generate construction lines for logos
        and export editable
        assets.</p>
      <label
        class="border border-dashed border-[var(--color-line)] rounded-lg h-[100px] text-center bg-[#F9FBFF] transition-all duration-200 relative cursor-pointer flex flex-col items-center justify-center hover:border-[var(--color-accent)] hover:bg-[rgba(94,106,210,0.02)]">
        <svg class="w-6 h-6 mb-2 text-[var(--color-accent)]" xmlns="http://www.w3.org/2000/svg" fill="none"
          viewBox="0 0 24 24" stroke="currentColor">
          <path d="M12 22V13M12 13L15.5 16.5M12 13L8.5 16.5" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round"></path>
          <path
            d="M20 17.6073C21.4937 17.0221 23 15.6889 23 13C23 9 19.6667 8 18 8C18 6 18 2 12 2C6 2 6 6 6 8C4.33333 8 1 9 1 13C1 15.6889 2.50628 17.0221 4 17.6073"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
        <span class="text-[var(--color-ink)] font-medium text-[14px]" data-i18n="uploadSvg">Upload SVG File</span>
        <span class="text-[12px] text-[var(--color-muted)]" data-i18n="dragDrop">Drag and drop or click to browse</span>
        <input id="svgFile" type="file" accept=".svg,image/svg+xml" class="absolute inset-0 opacity-0 cursor-pointer" />
      </label>

      <label class="flex flex-col gap-0">
        <span class="text-[13px] text-[var(--color-muted)]" data-i18n="pasteSvg">Or paste SVG Code</span>
        <textarea id="svgInput"
          class="w-full rounded-lg border border-[var(--color-line)] p-2 px-3 font-mono text-[12px] bg-[#fafafa] text-[var(--color-ink)] transition-all duration-200 outline-none h-[80px] resize-none overflow-y-auto leading-relaxed focus:border-[var(--color-accent)] focus:bg-white focus:ring focus:ring-[rgba(94,106,210,0.15)]"
          placeholder="<svg>...</svg>"></textarea>
      </label>

      <button
        class="w-full cursor-pointer rounded-lg border border-[var(--color-accent)] bg-[var(--color-accent)] text-white shadow-sm flex items-center justify-center h-[36px] px-4 text-[14px] font-medium transition-all duration-200 hover:bg-[var(--color-accent-hover)] hover:border-[var(--color-accent-hover)] active:translate-y-px"
        id="analyzeBtn" data-i18n="analyzeBtn">Analyze SVG</button>

      <div class="border border-blue-200 bg-blue-50 p-4 rounded-lg flex flex-col gap-4">
        <div>
          <h2 class="mb-2 text-[14px] font-semibold flex items-center gap-1.5">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
              class="flex-shrink-0 text-[var(--color-accent)]">
              <path fill-rule="evenodd" clip-rule="evenodd"
                d="M7.25 4C7.25 3.58579 7.58579 3.25 8 3.25L16 3.25C16.4142 3.25 16.75 3.58579 16.75 4C16.75 4.41421 16.4142 4.75 16 4.75L8 4.75C7.58579 4.75 7.25 4.41421 7.25 4Z"
                fill="currentColor"></path>
              <path
                d="M9 3.75C9.41421 3.75 9.75 4.08579 9.75 4.5L9.75 10.2602C9.75 10.9166 9.51517 11.5514 9.08796 12.0498L7.20363 14.2482L16.7964 14.2482L14.912 12.0498C14.4848 11.5514 14.25 10.9166 14.25 10.2602L14.25 4.5C14.25 4.08579 14.5858 3.75 15 3.75C15.4142 3.75 15.75 4.08579 15.75 4.5L15.75 10.2602C15.75 10.5585 15.8567 10.8471 16.0509 11.0736L21.088 16.9502C21.5152 17.4486 21.75 18.0834 21.75 18.7398V19C21.75 20.5188 20.5188 21.75 19 21.75L5 21.75C3.48122 21.75 2.25 20.5188 2.25 19V18.7398C2.25 18.0834 2.48483 17.4486 2.91204 16.9502L7.94907 11.0736C8.14326 10.8471 8.25 10.5585 8.25 10.2602L8.25 4.5C8.25 4.08579 8.58579 3.75 9 3.75Z"
                fill="currentColor"></path>
              <path fill-rule="evenodd" clip-rule="evenodd"
                d="M12.5117 8.44156C12.8196 8.71865 12.8446 9.19287 12.5675 9.50075L12.5575 9.51186C12.2804 9.81975 11.8062 9.84471 11.4983 9.56761C11.1904 9.29052 11.1654 8.8163 11.4425 8.50842L11.4525 8.49731C11.7296 8.18942 12.2038 8.16447 12.5117 8.44156Z"
                fill="currentColor"></path>
              <path fill-rule="evenodd" clip-rule="evenodd"
                d="M11.5117 1.44156C11.8196 1.71865 11.8446 2.19287 11.5675 2.50075L11.5575 2.51186C11.2804 2.81975 10.8062 2.84471 10.4983 2.56761C10.1904 2.29052 10.1654 1.8163 10.4425 1.50842L10.4525 1.49731C10.7296 1.18942 11.2038 1.16447 11.5117 1.44156Z"
                fill="currentColor"></path>
            </svg>
            <span data-i18n="phase2Title">Experimental Features</span>
          </h2>
          <div class="flex items-center gap-1">
            <p class="text-[12px] text-[var(--color-muted)] whitespace-nowrap" data-i18n="phase2Desc">Requires Gemini
              API Key</p>
            <input id="geminiApiKey" type="password"
              class="flex-1 h-6 min-w-0 rounded-lg border border-blue-200 bg-white/60 px-2 py-1 text-[12px] font-mono outline-none transition-all duration-200 focus:border-[var(--color-accent)] focus:ring focus:ring-[rgba(94,106,210,0.15)]"
              placeholder="AIza..." />
          </div>
        </div>

        <label
          class="border border-dashed border-blue-200 rounded-lg h-[100px] text-center bg-white/60 transition-all duration-200 relative cursor-pointer flex flex-col items-center justify-center hover:border-[var(--color-accent)] hover:bg-white">
          <svg class="w-6 h-6 mb-2 text-[var(--color-accent)]" xmlns="http://www.w3.org/2000/svg" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path
              d="M21 3.6V20.4C21 20.7314 20.7314 21 20.4 21H3.6C3.26863 21 3 20.7314 3 20.4V3.6C3 3.26863 3.26863 3 3.6 3H20.4C20.7314 3 21 3.26863 21 3.6Z"
              stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M3 16L10 13L21 18" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
            <path
              d="M16 10C14.8954 10 14 9.10457 14 8C14 6.89543 14.8954 6 16 6C17.1046 6 18 6.89543 18 8C18 9.10457 17.1046 10 16 10Z"
              stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <span class="text-[var(--color-ink)] font-medium text-[14px]" data-i18n="uploadImg">Upload Image</span>
          <span class="text-[12px] text-[var(--color-muted)]" data-i18n="dragDrop">Drag and drop or click to
            browse</span>
          <input id="imageFile" type="file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" />
        </label>

        <button
          class="w-full cursor-pointer rounded-lg border border-blue-200 bg-white/60 text-[var(--color-ink)] flex items-center justify-center h-[36px] px-4 text-[14px] font-medium transition-all duration-200 hover:bg-white hover:border-[var(--color-accent)] active:translate-y-px"
          id="vectorizeBtn" data-i18n="vectorizeBtn">Vectorize Image + Analyze</button>
      </div>

      <p id="status"
        class="mt-auto pt-4 text-[12px] text-[var(--color-muted)] font-mono border-t border-[var(--color-line)]"
        data-i18n="statusReady">Ready.</p>
    </section>

    <section
      class="bg-[var(--color-panel)] border border-[var(--color-line)] rounded-2xl relative p-0 flex flex-col overflow-hidden min-h-[700px]">
      <div class="p-4 flex justify-between items-center">
        <div class="flex items-baseline gap-3">
          <strong data-i18n="previewTitle">Preview</strong>
          <span id="signature" class="text-[var(--color-muted)] text-[13px] font-mono"></span>
        </div>
        <div class="flex gap-3 mb-0">
          <button
            class="flex-1 cursor-pointer rounded-lg border border-[var(--color-line)] bg-[#f8f9fc] text-[var(--color-ink)] flex items-center justify-center h-[32px] px-3 font-medium text-[12px] whitespace-nowrap transition-all duration-200 hover:bg-[#f1f3f7] active:translate-y-px"
            id="exportSvgBtn" data-i18n="exportSvg">Export
            SVG</button>
        </div>
      </div>

      <div
        class="relative flex-1 w-full min-h-[520px] bg-[#f8f9fa] overflow-hidden flex flex-col rounded-b-2xl border-none"
        style="background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 20px 20px;">
        <div class="absolute top-4 left-4 right-4 flex justify-between z-10 pointer-events-none items-start">
          <div id="leftControlsGroup"
            class="segmented-control flex-col p-0 text-[var(--color-muted)] text-[13px] pointer-events-auto"
            style="display:none;">
            <div id="layersControl" class="flex items-center gap-2 h-[44px] px-3">
              <span data-i18n="displayLabel"
                class="font-medium w-16 flex-shrink-0 select-none whitespace-nowrap">显示</span>
              <label data-i18n="layerLogo"><input id="toggleLogo" type="checkbox" checked /> logo</label>
              <label data-i18n="layerGuides"><input id="toggleGuides" type="checkbox" checked /> guides</label>
              <label data-i18n="layerAnnotations"><input id="toggleAnnotations" type="checkbox" checked />
                annotations</label>
            </div>
            <div id="candidateList" class="flex items-center gap-2 h-[44px] px-3 border-t border-[var(--color-line)]">
              <span data-i18n="guidesFieldLabel"
                class="font-medium w-16 flex-shrink-0 select-none whitespace-nowrap">参考线</span>
              <!-- Candidates will be rendered here as radio buttons -->
            </div>
          </div>
          <div id="rightControlsGroup" class="flex flex-col items-end gap-0">
            <div id="controlsWrapper"
              class="segmented-control hidden flex-col p-0 text-[var(--color-muted)] text-[13px]">
              <div class="flex items-center justify-between gap-4 h-[44px] px-3">
                <span data-i18n="curve" class="font-medium">Curve</span>
                <div class="flex items-center gap-1">
                  <input type="color" id="circleColor" class="small-color" value="#0057ff" title="Curve Color" />
                  <input type="number" id="circleWeight" value="0.15" step="0.05" min="0.05"
                    class="w-[52px] px-1 py-0.5 min-h-[24px] border border-[var(--color-line)] rounded-lg"
                    title="Curve Weight" />
                  <span data-i18n="line" class="ml-1.5 font-medium">Line</span>
                  <input type="color" id="lineColor" class="small-color" value="#ff6d00" title="Line Color" />
                  <input type="number" id="lineWeight" value="0.15" step="0.05" min="0.05"
                    class="w-[52px] px-1 py-0.5 min-h-[24px] border border-[var(--color-line)] rounded-lg"
                    title="Line Weight" />
                </div>
              </div>
              <div class="flex items-center justify-between gap-4 h-[44px] px-3 border-t border-[var(--color-line)]">
                <span data-i18n="tolerance">Tolerance</span>
                <div class="flex-1 flex items-center gap-[6px]">
                  <input type="range" id="toleranceRange" min="0.1" max="10" step="0.1" value="2.5" class="flex-1"
                    title="Tolerance Multiplier" />
                  <span id="toleranceVal" class="w-[24px]" style="font-variant-numeric: tabular-nums;">2.5</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="svgCanvas" class="flex-1 w-full grid place-items-center overflow-auto pt-[60px]">
          <span class="text-[#98a2ad]">No analysis yet.</span>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="/app.js"></script>
</body>

</html>
