<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <style>
        /* === Design Tokens === */
        :root {
            --accent: #111;
            --accent-hover: #333;
            --line: #e2e8f0;
            --panel: #ffffff;
            --ink: #1e293b;
            --muted: #64748b;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 12px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--ink);
            font-size: 14px;
        }

        /* === Utility Classes === */
        .flex {
            display: flex;
        }

        .flex-col {
            flex-direction: column;
        }

        .flex-1 {
            flex: 1 1 0%;
        }

        .items-center {
            align-items: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .justify-center {
            justify-content: center;
        }

        .gap-1 {
            gap: 0.25rem;
        }

        .gap-2 {
            gap: 0.5rem;
        }

        .gap-3 {
            gap: 0.75rem;
        }

        .space-y-2>*+* {
            margin-top: 0.5rem;
        }

        .relative {
            position: relative;
        }

        .absolute {
            position: absolute;
        }

        .bottom-2 {
            bottom: 0.5rem;
        }

        .right-2 {
            right: 0.5rem;
        }

        .left-2 {
            left: 0.5rem;
        }

        .overflow-hidden {
            overflow: hidden;
        }

        .p-2 {
            padding: 0.5rem;
        }

        .p-4 {
            padding: 1rem;
        }

        .px-1 {
            padding-left: 0.25rem;
            padding-right: 0.25rem;
        }

        .mx-3 {
            margin-left: 0.75rem;
            margin-right: 0.75rem;
        }

        .ml-1 {
            margin-left: 0.25rem;
        }

        .w-6 {
            width: 1.5rem;
        }

        .w-12 {
            width: 3rem;
        }

        .w-full {
            width: 100%;
        }

        .w-\[240px\] {
            width: 240px;
        }

        .h-full {
            height: 100%;
        }

        .max-w-\[80\%\] {
            max-width: 80%;
        }

        .rounded {
            border-radius: 0.25rem;
        }

        .rounded-lg {
            border-radius: 0.5rem;
        }

        .border {
            border: 1px solid var(--line);
        }

        .border-line {
            border-color: var(--line);
        }

        .bg-white {
            background-color: #ffffff;
        }

        .bg-canvas {
            background-color: #e4e9ef;
        }

        .text-ink {
            color: var(--ink);
        }

        .text-muted {
            color: var(--muted);
        }

        .text-red-500 {
            color: #ef4444;
        }

        .text-\[12px\] {
            font-size: 12px;
        }

        .text-\[10px\] {
            font-size: 10px;
        }

        .text-right {
            text-align: right;
        }

        .text-left {
            text-align: left;
        }

        .text-center {
            text-align: center;
        }

        .font-medium {
            font-weight: 500;
        }

        .font-mono {
            font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace;
        }

        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }

        .whitespace-pre {
            white-space: pre;
        }

        .cursor-pointer {
            cursor: pointer;
        }

        .pointer-events-auto {
            pointer-events: auto;
        }

        .select-all {
            user-select: all;
        }

        .outline-none {
            outline: none;
        }

        .accent-accent {
            accent-color: var(--accent);
        }

        .focus\:border-accent:focus {
            border-color: var(--accent);
        }

        /* Segmented Control */
        .segmented-control {
            background-color: var(--line);
            padding: 2px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .segment-btn {
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 500;
            border-radius: 4px;
            color: var(--muted);
            transition: all 0.2s;
        }

        .segment-btn.active {
            background-color: #ffffff;
            color: var(--ink);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        /* === Custom Components === */
        .color-picker {
            width: 20px;
            height: 20px;
            padding: 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: none;
        }

        .color-picker::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-picker::-webkit-color-swatch {
            border: 1px solid var(--line);
            border-radius: 4px;
        }

        /* Range slider */
        input[type="range"] {
            accent-color: var(--accent);
        }

        input[type="number"] {
            font-size: 12px;
            -moz-appearance: textfield;
            appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Toggle Switch */
        .toggle-switch {
            position: relative;
            width: 28px;
            height: 16px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background-color: var(--line);
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            left: 2px;
            bottom: 2px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle-switch input:checked+.toggle-slider {
            background-color: var(--accent);
        }

        .toggle-switch input:checked+.toggle-slider::before {
            transform: translateX(12px);
        }

        /* Analyze button */
        .btn-analyze {
            width: 100%;
            padding: 8px 0;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-analyze:hover {
            background: var(--accent-hover);
        }

        .btn-analyze:disabled {
            background: var(--line);
            color: var(--muted);
            cursor: not-allowed;
        }
    </style>
</head>

<body class="text-ink">
    <div class="flex flex-col gap-3 h-full">

        <!-- Top Header -->
        <div class="flex items-center justify-between px-1">
            <span class="text-[12px] font-medium text-ink">ArcGrid</span>
            <div id="langToggle" class="segmented-control">
                <div id="btnEn" class="segment-btn active">EN</div>
                <div id="btnZh" class="segment-btn">中</div>
            </div>
        </div>

        <!-- Settings Panel -->
        <div class="bg-white rounded-lg border border-line p-2 space-y-2 text-[12px]">
            <!-- Display Toggles -->
            <div class="flex items-center justify-between mb-2">
                <span class="font-medium" data-i18n="display">Display</span>
                <div class="flex items-center gap-3 font-mono justify-between w-[240px]">
                    <label class="flex items-center gap-1 cursor-pointer">
                        <span class="toggle-switch">
                            <input type="checkbox" id="toggleLogo" checked>
                            <span class="toggle-slider"></span>
                        </span>
                        <span data-i18n="logo">Logo</span>
                    </label>
                    <label class="flex items-center gap-1 cursor-pointer">
                        <span class="toggle-switch">
                            <input type="checkbox" id="toggleGuides" checked>
                            <span class="toggle-slider"></span>
                        </span>
                        <span data-i18n="guides">Guides</span>
                    </label>
                    <label class="flex items-center gap-1 cursor-pointer">
                        <span class="toggle-switch">
                            <input type="checkbox" id="toggleAnnotations" checked>
                            <span class="toggle-slider"></span>
                        </span>
                        <span data-i18n="text">Text</span>
                    </label>
                </div>
            </div>

            <!-- Line properties -->
            <div class="flex items-center justify-between">
                <span class="font-medium" data-i18n="lines">Lines</span>
                <div class="flex gap-2 items-center font-mono justify-between w-[240px]">
                    <div class="flex gap-1 items-center border border-line rounded px-1" style="padding: 2px 4px;">
                        <span class="text-muted text-[11px]" data-i18n="curve">Curve</span>
                        <input type="color" id="circleColor" value="#6496ff" class="color-picker">
                        <input type="number" id="circleWeight" value="2" step="0.5" min="0.1"
                            class="w-12 border border-line rounded px-1 text-center outline-none focus:border-accent">
                    </div>
                    <div class="flex gap-1 items-center border border-line rounded px-1" style="padding: 2px 4px;">
                        <span class="text-muted text-[11px]" data-i18n="line">Line</span>
                        <input type="color" id="lineColor" value="#ff6d00" class="color-picker">
                        <input type="number" id="lineWeight" value="2" step="0.5" min="0.1"
                            class="w-12 border border-line rounded px-1 text-center outline-none focus:border-accent">
                    </div>
                </div>
            </div>
            <div class="flex items-center justify-between">
                <span class="font-medium" data-i18n="tol">Tolerance</span>
                <div class="flex items-center gap-2 justify-end w-[240px]">
                    <input type="range" id="toleranceRange" min="0.1" max="10" step="0.1" value="2.5"
                        class="flex-1 accent-accent">
                    <span id="toleranceVal" class="w-6 text-right tabular-nums font-mono text-muted">2.5</span>
                </div>
            </div>
        </div>

        <!-- Canvas area -->
        <div
            class="flex-1 bg-canvas rounded-lg border border-line relative overflow-hidden flex items-center justify-center p-4">
            <!-- Container for preview -->
            <div id="svgCanvas" class="w-full h-full flex items-center justify-center relative"></div>

            <!-- Status text overlay (outside svgCanvas so innerHTML clearing won't affect it) -->
            <div id="statusWrapper" class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <span class="text-muted text-[12px] text-center px-4 leading-relaxed pointer-events-auto"
                    id="statusText" data-i18n="wait">Waiting for selection...</span>
            </div>

            <!-- Overlay text -->
            <div id="analysisOverlay"
                class="absolute bottom-2 right-2 text-[10px] font-mono whitespace-pre text-muted text-right pointer-events-auto select-all">
            </div>
            <div id="logOverlay"
                class="absolute bottom-2 left-2 text-[10px] font-mono whitespace-pre text-red-500 max-w-[80%] text-left">
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-2 w-full">
            <button id="analyzeBtn" class="btn-analyze" style="flex: 2;" disabled data-i18n="waitBtn">Select an element
                to
                analyze</button>
            <button id="exportBtn" class="btn-analyze" style="flex: 1; display: none;" disabled
                data-i18n="export">Export to
                Figma</button>
        </div>
    </div>

    <script>
        // 1. Inject ArcGrid Solver (bundled from src/lib/solver/index.mjs via build.mjs)
        /* __SOLVER_BUNDLE__ */

        const i18n = {
            en: { display: "Display", logo: "Logo", guides: "Guides", text: "Specs", lines: "Lines", tol: "Tolerance", curve: "Curve", line: "Line", export: "Export to Figma", wait: "Waiting for selection...", waitBtn: "Select an element to analyze", analyzing: "Analyzing...", analyzingTitle: "Analyzing {0}...", analyzeBtn: "Analyze \"{0}\"", retryBtn: "Retry \"{0}\"", selected: "Selected: {0}", errDecode: "Error decoding SVG: {0}", errMulti: "Please select exactly one SVG node." },
            zh: { display: "显示", logo: "图形", guides: "参考线", text: "标注", lines: "线条", tol: "容差", curve: "曲线", line: "直线", export: "导出至 Figma", wait: "请在画布中选中元素...", waitBtn: "选择元素以进行分析", analyzing: "分析中...", analyzingTitle: "正在分析 {0}...", analyzeBtn: "分析 \"{0}\"", retryBtn: "重试 \"{0}\"", selected: "已选中: {0}", errDecode: "SVG 解析失败: {0}", errMulti: "请仅选择一个 SVG 元素进行分析。" }
        };

        const state = {
            lang: 'en',
            svgText: null,
            name: '',
            analysisResult: null,
            pluginState: 'idle' // idle, loading, ready, error
        };

        function t(key, arg) {
            return i18n[state.lang][key].replace('{0}', arg || '');
        }

        const DOM = {
            langToggle: document.getElementById('langToggle'),
            statusText: document.getElementById('statusText'),
            statusWrapper: document.getElementById('statusWrapper'),
            svgCanvas: document.getElementById('svgCanvas'),
            analysisOverlay: document.getElementById('analysisOverlay'),
            logOverlay: document.getElementById('logOverlay'),
            analyzeBtn: document.getElementById('analyzeBtn'),
            exportBtn: document.getElementById('exportBtn'),
            toggleLogo: document.getElementById('toggleLogo'),
            toggleGuides: document.getElementById('toggleGuides'),
            toggleAnnotations: document.getElementById('toggleAnnotations'),
            circleColor: document.getElementById('circleColor'),
            circleWeight: document.getElementById('circleWeight'),
            lineColor: document.getElementById('lineColor'),
            lineWeight: document.getElementById('lineWeight'),
            toleranceRange: document.getElementById('toleranceRange'),
            toleranceVal: document.getElementById('toleranceVal')
        };

        function updateStaticTexts() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (key === 'wait' || key === 'waitBtn') return; // Handled by dynamic texts
                el.textContent = t(key);
            });
            updateDynamicTexts();
        }

        function updateDynamicTexts() {
            if (state.pluginState === 'idle') {
                DOM.analyzeBtn.textContent = t('waitBtn');
                DOM.statusText.textContent = state.errorMsg || t('wait');
            } else if (state.pluginState === 'loading') {
                DOM.analyzeBtn.textContent = t('analyzing');
                DOM.statusText.textContent = t('analyzingTitle', state.name);
            } else if (state.pluginState === 'ready' || state.pluginState === 'success') {
                DOM.analyzeBtn.textContent = t('analyzeBtn', state.name);
                DOM.statusText.textContent = t('selected', state.name);
            } else if (state.pluginState === 'error') {
                DOM.analyzeBtn.textContent = state.name ? t('retryBtn', state.name) : t('waitBtn');
                DOM.statusText.textContent = state.errorMsg || t('errMulti');
            }
        }

        DOM.langToggle.addEventListener('click', (e) => {
            // Check if clicking specific segment or just toggling
            if (e.target.id === 'btnEn' && state.lang === 'en') return;
            if (e.target.id === 'btnZh' && state.lang === 'zh') return;

            state.lang = state.lang === 'en' ? 'zh' : 'en';

            if (state.lang === 'en') {
                document.getElementById('btnEn').classList.add('active');
                document.getElementById('btnZh').classList.remove('active');
            } else {
                document.getElementById('btnZh').classList.add('active');
                document.getElementById('btnEn').classList.remove('active');
            }

            updateStaticTexts();
        });

        function renderPreview() {
            if (!state.analysisResult) return;
            const { input, bestSolution, metrics } = state.analysisResult;
            const { bbox } = input;

            window.latestAnalysis = state.analysisResult; // For dev debugging

            const swG = bbox.width * 0.002;
            const padX = bbox.width * 0.2;
            const padY = bbox.height * 0.2;

            const cColor = DOM.circleColor.value;
            const cWeight = parseFloat(DOM.circleWeight.value);
            const lColor = DOM.lineColor.value;
            const lWeight = parseFloat(DOM.lineWeight.value);

            const circles = bestSolution.circles.map(c =>
                `<circle cx="${c.cx}" cy="${c.cy}" r="${c.r}" fill="none" stroke="${cColor}" stroke-width="${swG * cWeight}" stroke-dasharray="${swG * cWeight * 3} ${swG * cWeight * 2}" />`
            ).join('');

            const lines = bestSolution.lines.map(l =>
                `<line x1="${l.x1}" y1="${l.y1}" x2="${l.x2}" y2="${l.y2}" stroke="${lColor}" stroke-width="${swG * lWeight}" stroke-dasharray="${swG * lWeight * 2} ${swG * lWeight * 2}" />`
            ).join('');

            let originalContent = '';
            let svgRootAttrs = '';
            if (input.raw) {
                const svgTagMatch = input.raw.match(/<svg([^>]*)>([\s\S]*?)<\/svg>/i);
                if (svgTagMatch) {
                    originalContent = svgTagMatch[2];
                    const attrs = svgTagMatch[1];
                    const inheritParts = [];
                    for (const name of ["fill", "stroke", "stroke-width", "stroke-linecap", "stroke-linejoin", "clip-rule", "fill-rule"]) {
                        const m = attrs.match(new RegExp(`${name}\\s*=\\s*["']([^"']*)["']`, "i"));
                        if (m) inheritParts.push(`${name}="${m[1]}"`);
                    }
                    svgRootAttrs = inheritParts.join(" ");
                }
            }

            const viewBox = `${bbox.minX - padX} ${bbox.minY - padY} ${bbox.width + padX * 2} ${bbox.height + padY * 2}`;

            const svgHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}" width="100%" height="100%">
          <g id="preview-logo" opacity="0.8" style="display: ${DOM.toggleLogo.checked ? 'inline' : 'none'};" ${svgRootAttrs}>
            ${originalContent}
          </g>
          <g id="preview-guides" style="display: ${DOM.toggleGuides.checked ? 'inline' : 'none'};">
            ${circles}${lines}
          </g>
        </svg>
      `;

            DOM.svgCanvas.innerHTML = svgHTML;

            if (DOM.toggleAnnotations.checked) {
                DOM.analysisOverlay.textContent =
                    `ArcGrid: ${ArcGridSolver.solverSignature}\n` +
                    `Score: ${metrics.finalScore.toFixed(2)} (Fit: ${metrics.fitError.toFixed(2)})\n` +
                    `Nodes: ${bestSolution.lines.length} Line(s), ${bestSolution.circles.length} Curve(s)\n` +
                    `Tol. Multiplier: ${DOM.toleranceRange.value}`;
                DOM.analysisOverlay.style.display = '';
            } else {
                DOM.analysisOverlay.style.display = 'none';
            }
        }

        async function runAnalysis() {
            if (!state.svgText) return;
            DOM.statusWrapper.style.display = 'none';
            DOM.logOverlay.textContent = '';

            try {
                const config = {
                    toleranceMultiplier: parseFloat(DOM.toleranceRange.value)
                };

                // ArcGridSolver is created by esbuild using globalName: 'ArcGridSolver'
                state.analysisResult = ArcGridSolver.analyzeLogo({ svgText: state.svgText, strategy: 'auto', constraints: config });
                renderPreview();
            } catch (err) {
                console.error(err);
                DOM.svgCanvas.innerHTML = '';
                DOM.logOverlay.textContent = err.message || err.toString();
                DOM.analysisOverlay.textContent = '';
                state.svgText = null;
                DOM.exportBtn.disabled = true;
                DOM.exportBtn.style.display = 'none';
            }
        }

        // Event Listeners
        DOM.toleranceRange.addEventListener('input', (e) => {
            DOM.toleranceVal.textContent = e.target.value;
            runAnalysis();
        });

        [DOM.circleColor, DOM.circleWeight, DOM.lineColor, DOM.lineWeight].forEach(el => el.addEventListener('change', renderPreview));
        [DOM.toggleLogo, DOM.toggleGuides, DOM.toggleAnnotations].forEach(el => el.addEventListener('change', renderPreview));

        // Analyze button — sends message to plugin sandbox to export SVG
        DOM.analyzeBtn.addEventListener('click', () => {
            parent.postMessage({ pluginMessage: { type: 'analyze' } }, '*');
            DOM.analyzeBtn.disabled = true;
            state.pluginState = 'loading';
            updateDynamicTexts();
        });

        DOM.exportBtn.addEventListener('click', () => {
            if (!DOM.svgCanvas.innerHTML || !state.name) return;
            // Set logo to full opacity for export (preview uses 0.8 for visual clarity,
            // but the original SVG content already carries its own opacity from Figma)
            const logoGroup = DOM.svgCanvas.querySelector('#preview-logo');
            if (logoGroup) logoGroup.setAttribute('opacity', '1');
            const exportSvg = DOM.svgCanvas.innerHTML;
            if (logoGroup) logoGroup.setAttribute('opacity', '0.8');
            parent.postMessage({
                pluginMessage: {
                    type: 'export-svg',
                    svgString: exportSvg
                }
            }, '*');

            // Clear result after export to signify completed task
            state.analysisResult = null;
            state.pluginState = 'idle';
            DOM.svgCanvas.innerHTML = '';
            DOM.exportBtn.style.display = 'none';
            DOM.statusWrapper.style.display = '';
            updateDynamicTexts();
        });

        // Handle Messages from Plugin Sandbox
        window.onmessage = (event) => {
            const msg = event.data.pluginMessage;
            if (!msg) return;

            if (msg.type === 'svg-data') {
                try {
                    const decoder = new TextDecoder('utf-8');
                    state.svgText = decoder.decode(msg.svgBytes);
                    state.name = msg.name;
                    runAnalysis();
                    state.pluginState = 'ready';
                    DOM.analyzeBtn.disabled = false;
                    DOM.exportBtn.disabled = false;
                    DOM.exportBtn.style.display = '';
                    updateDynamicTexts();
                } catch (e) {
                    state.pluginState = 'error';
                    state.errorMsg = t('errDecode', e.message);
                    DOM.statusWrapper.style.display = '';
                    DOM.svgCanvas.innerHTML = '';
                    DOM.analyzeBtn.disabled = false;
                    DOM.exportBtn.disabled = true;
                    DOM.exportBtn.style.display = 'none';
                    updateDynamicTexts();
                }
            } else if (msg.type === 'loading') {
                state.name = msg.name;
                state.pluginState = 'loading';
                DOM.statusWrapper.style.display = '';
                DOM.svgCanvas.innerHTML = '';
                DOM.logOverlay.textContent = '';
                DOM.analysisOverlay.textContent = '';
                DOM.exportBtn.disabled = true;
                DOM.exportBtn.style.display = 'none';
                updateDynamicTexts();
            } else if (msg.type === 'selection-ready') {
                // Node selected — enable the button, don't auto-analyze
                state.name = msg.name;
                state.pluginState = 'ready';
                DOM.analyzeBtn.disabled = false;
                DOM.statusWrapper.style.display = state.analysisResult ? 'none' : '';
                updateDynamicTexts();
            } else if (msg.type === 'no-selection' || msg.type === 'multi-selection' || msg.type === 'error') {
                if ((msg.type === 'no-selection' || msg.type === 'multi-selection') && state.analysisResult) {
                    // Retain the visual result but update state
                    state.pluginState = 'idle';
                    DOM.analyzeBtn.disabled = true;
                    DOM.statusWrapper.style.display = 'none';
                    updateDynamicTexts();
                } else {
                    state.pluginState = msg.type === 'error' ? 'error' : 'idle';
                    state.name = '';
                    state.errorMsg = msg.message || (msg.type === 'multi-selection' ? t('errMulti') : '');
                    DOM.statusWrapper.style.display = '';
                    DOM.svgCanvas.innerHTML = '';
                    DOM.logOverlay.textContent = '';
                    DOM.analysisOverlay.textContent = '';
                    DOM.analyzeBtn.disabled = true;

                    if (msg.type === 'error' || !state.analysisResult) {
                        DOM.exportBtn.disabled = true;
                        DOM.exportBtn.style.display = 'none';
                    }

                    updateDynamicTexts();
                }
            }
        };

        // Initialize i18n
        updateStaticTexts();
    </script>
</body>

</html>
